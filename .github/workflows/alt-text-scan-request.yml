name: Alt Text Scan Request

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: write
  issues: write

concurrency:
  group: scan-repository
  cancel-in-progress: false

jobs:
  run-alt-text-scan:
    if: startsWith(github.event.issue.title, 'SCAN:')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Timeout / behaviour configuration (optional, defaults shown):
      # - MAX_DISCOVER_URLS:     Max pages to discover via sitemap/crawl (default: 100)
      # - PAGE_LOAD_DELAY_MS:    Extra ms to wait after page load (default: 500)
      # - NAV_TIMEOUT_MS:        Per-page navigation timeout (default: 30000)
      # - TOTAL_SCAN_TIMEOUT_MS: Total scan wall-clock limit (default: 3000000 = 50 min)

      - name: Persist event payload
        run: |
          mkdir -p .tmp
          cat > .tmp/issue-event.json <<'EOF'
          ${{ toJson(github.event) }}
          EOF

      - name: Run alt text scan
        run: |
          mkdir -p .scan-output
          node scanner/run-alt-text-scan.mjs .tmp/issue-event.json .scan-output > .scan-output/meta.json
        # env:
        #   MAX_DISCOVER_URLS: "100"
        #   PAGE_LOAD_DELAY_MS: "500"
        #   NAV_TIMEOUT_MS: "30000"
        #   TOTAL_SCAN_TIMEOUT_MS: "3000000"

      - name: Read scan metadata
        id: meta
        run: |
          node --input-type=module <<'NODE'
          import { appendFileSync, readFileSync } from 'node:fs';

          const meta = JSON.parse(readFileSync('.scan-output/meta.json', 'utf8'));
          const issueNumber = Number(process.env.ISSUE_NUMBER);
          const stamp = new Date().toISOString().replace(/[:.]/g, '-');
          const reportDir = `reports/issues/issue-${issueNumber}/${stamp}`;

          const output = process.env.GITHUB_OUTPUT;
          const lines = [
            `urls_scanned=${meta.urlsScanned ?? 0}`,
            `total_images=${meta.totalImages ?? 0}`,
            `images_with_issues=${meta.imagesWithIssues ?? 0}`,
            `scan_title=${(meta.scanTitle ?? '').replace(/\n/g, ' ')}`,
            `scan_domain=${meta.scanDomain ?? ''}`,
            `discovery_method=${meta.discoveryMethod ?? 'explicit'}`,
            `report_dir=${reportDir}`,
            `stamp=${stamp}`
          ].join('\n') + '\n';

          appendFileSync(output, lines, 'utf8');
          NODE
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}

      - name: Persist reports into repository
        run: |
          mkdir -p "${{ steps.meta.outputs.report_dir }}"
          cp .scan-output/alt-text-report.json "${{ steps.meta.outputs.report_dir }}/report.json"
          cp .scan-output/alt-text-report.csv  "${{ steps.meta.outputs.report_dir }}/report.csv"
          cp .scan-output/alt-text-report.html "${{ steps.meta.outputs.report_dir }}/report.html"

      - name: Regenerate reports.html
        run: node scanner/generate-reports-html.mjs

      - name: Commit and push report artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.meta.outputs.report_dir }}" reports.html
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "chore(alt-text): issue #${{ github.event.issue.number }} ${{ steps.meta.outputs.scan_title }}"

            PUSH_SUCCESS=false
            for attempt in 1 2 3; do
              echo "Push attempt $attempt..."
              if git pull --rebase origin main; then
                if git push origin HEAD:main; then
                  echo "Successfully pushed on attempt $attempt"
                  PUSH_SUCCESS=true
                  break
                fi
              else
                if git status | grep -q "rebase in progress"; then
                  if git diff --name-only --diff-filter=U 2>/dev/null | grep -q "^reports\.html$"; then
                    echo "Conflict in generated reports.html — resolving by regenerating..."
                    node scanner/generate-reports-html.mjs
                    git add reports.html
                    if GIT_EDITOR=true git rebase --continue; then
                      if git push origin HEAD:main; then
                        echo "Successfully pushed on attempt $attempt (after resolving reports.html conflict)"
                        PUSH_SUCCESS=true
                        break
                      fi
                    fi
                  fi
                  git rebase --abort 2>/dev/null || true
                fi
              fi

              if [ $attempt -lt 3 ]; then
                sleep $((attempt * 2))
                echo "Retrying..."
              fi
            done

            if [ "$PUSH_SUCCESS" = false ]; then
              echo "Failed to push after 3 attempts" >&2
              exit 1
            fi
          fi

      - name: Comment report link
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.payload.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const reportDir = process.env.REPORT_DIR;
            const pagesUrl = `https://${owner}.github.io/${repo}/${reportDir}/report.html`;
            const csvPagesUrl = `https://${owner}.github.io/${repo}/${reportDir}/report.csv`;
            const blobUrl = `https://github.com/${owner}/${repo}/blob/main/${reportDir}/report.html`;
            const csvBlobUrl = `https://github.com/${owner}/${repo}/blob/main/${reportDir}/report.csv`;

            const domain = process.env.SCAN_DOMAIN || process.env.SCAN_TITLE || context.payload.issue.title;
            const discoveryMethod = process.env.DISCOVERY_METHOD;
            const urlsScanned = process.env.URLS_SCANNED;
            const totalImages = process.env.TOTAL_IMAGES;
            const imagesWithIssues = process.env.IMAGES_WITH_ISSUES;

            const body = [
              `Alt text scan complete for **${domain}**.`,
              "",
              `- Pages scanned: ${urlsScanned}`,
              `- Discovery method: ${discoveryMethod}`,
              `- Total images found: ${totalImages}`,
              `- Images with issues: ${imagesWithIssues}`,
              "",
              `Report (Pages): ${pagesUrl}`,
              `Fallback (GitHub): ${blobUrl}`,
              `CSV (Pages): ${csvPagesUrl}`,
              `CSV Fallback (GitHub): ${csvBlobUrl}`
            ].join("\n");

            for (let attempt = 0; attempt < 3; attempt++) {
              try {
                await github.rest.issues.createComment({ owner, repo, issue_number: issueNumber, body });
                console.log("Comment posted successfully");
                break;
              } catch (error) {
                console.warn(`Attempt ${attempt + 1} failed:`, error.message);
                if (attempt < 2) await new Promise(r => setTimeout(r, Math.pow(2, attempt) * 1000));
                else throw error;
              }
            }
        env:
          REPORT_DIR: ${{ steps.meta.outputs.report_dir }}
          SCAN_DOMAIN: ${{ steps.meta.outputs.scan_domain }}
          SCAN_TITLE: ${{ steps.meta.outputs.scan_title }}
          DISCOVERY_METHOD: ${{ steps.meta.outputs.discovery_method }}
          URLS_SCANNED: ${{ steps.meta.outputs.urls_scanned }}
          TOTAL_IMAGES: ${{ steps.meta.outputs.total_images }}
          IMAGES_WITH_ISSUES: ${{ steps.meta.outputs.images_with_issues }}

      - name: Close issue after scan
        if: ${{ steps.meta.outputs.urls_scanned != '0' }}
        uses: actions/github-script@v7
        with:
          script: |
            for (let attempt = 0; attempt < 3; attempt++) {
              try {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.issue.number,
                  state: 'closed'
                });
                console.log("Issue closed successfully");
                break;
              } catch (error) {
                console.warn(`Attempt ${attempt + 1} failed to close issue:`, error.message);
                if (attempt < 2) await new Promise(r => setTimeout(r, Math.pow(2, attempt) * 1000));
                else throw error;
              }
            }
