name: Scan Request

on:
  issues:
    # Reopening an issue allows a retry after updating the request body.
    # Edits alone do not retrigger scans, which avoids accidental reruns.
    types: [opened, reopened]

permissions:
  contents: write
  issues: write
  actions: write

concurrency:
  group: scan-request-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  enqueue-scan-request:
    if: startsWith(github.event.issue.title, 'SCAN:')
    runs-on: ubuntu-latest

    steps:
      - name: Acknowledge scan request
        id: acknowledge_scan
        if: github.event_name == 'issues'
        uses: actions/github-script@v8
        env:
          ISSUE_ACTION: ${{ github.event.action }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        with:
          script: |
            const issueTitle = process.env.ISSUE_TITLE || context.payload.issue.title;
            const scanLabel = issueTitle.replace(/^SCAN:\s*/i, '').trim() || issueTitle;
            const isRestart = process.env.ISSUE_ACTION === 'reopened';

            for (const name of ['scan-failed', 'scan-complete']) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }

            const commentLines = isRestart
              ? [
                  `🔄 **Alt text review re-queued** for \`${scanLabel}\`.`,
                  '',
                  'The request has been placed back in the scan queue. It will run after any scans already in progress finish.',
                  '',
                  '_No further edits to this issue will trigger additional scans. Close and reopen the issue to retry._'
                ]
              : [
                  `🗂️ **Alt text review queued** for \`${scanLabel}\`.`,
                  '',
                  'The request has been added to the scan queue. A worker workflow will process queued requests one at a time and post the report links here when the scan finishes.',
                  '',
                  '_No further edits to this issue will trigger additional scans. Close and reopen the issue to retry._'
                ];

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentLines.join('\n')
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['scan-in-progress']
            });
      - name: Trigger queue worker
        uses: actions/github-script@v8
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_ACTION: ${{ github.event.action }}
        with:
          script: |
            const issueNumber = Number(process.env.ISSUE_NUMBER);
            const attemptSource = process.env.ISSUE_ACTION === 'reopened' ? 'reopen' : 'new-issue';

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'scan-issue-queue.yml',
              ref: context.payload.repository.default_branch,
              inputs: {
                issue_number: String(issueNumber),
                source: attemptSource
              }
            });

      - name: Comment queue dispatch failure
        if: failure()
        uses: actions/github-script@v8
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = context.issue.number;
            const issueTitle = process.env.ISSUE_TITLE || context.payload.issue.title;
            const scanLabel = issueTitle.replace(/^SCAN:\s*/i, '').trim() || issueTitle;
            const body = [
              `❌ **Queueing failed** for \`${scanLabel}\`.`,
              '',
              `The request could not be placed in the scan queue. Check the [workflow run](${process.env.RUN_URL}) for details.`,
              '',
              'Close and reopen the issue to retry queueing the request.'
            ].join('\n');

            for (const name of ['scan-in-progress', 'scan-complete']) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  name
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issueNumber,
              labels: ['scan-failed']
            });

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body
            });